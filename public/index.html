<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacker Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

    :root {
      --bg: #000;
      --border: #00ff9f;
      --text: #00ff9f;
      --text-dim: rgba(0,255,159,0.65);
      --text-muted: rgba(0,255,159,0.4);
      --glow: 0 0 10px #00ff9f, 0 0 20px rgba(0,255,159,0.4);
      --font: 'Share Tech Mono', 'Courier New', monospace;
      --font-title: 'Orbitron', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(circle at top, #020617, #000);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── TERMINAL HEADER ── */
    .terminal {
      padding: 14px 24px;
      background: #000;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--glow);
      font-size: 0.9em;
      letter-spacing: 1px;
    }
    .terminal-prompt { color: var(--text-muted); }
    .cursor {
      display: inline-block;
      width: 8px; height: 15px;
      background: var(--text);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── TITLE ── */
    .title {
      font-family: var(--font-title);
      text-align: center;
      margin: 32px 20px 8px;
      letter-spacing: 6px;
      font-size: clamp(1.4em, 4vw, 2.2em);
      text-shadow: var(--glow);
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8em;
      letter-spacing: 3px;
      margin-bottom: 28px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      padding: 0 20px;
    }
    #search {
      width: 100%;
      max-width: 400px;
      padding: 12px 16px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95em;
      outline: none;
      letter-spacing: 1px;
      transition: box-shadow 0.3s;
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus { box-shadow: var(--glow); }

    /* ── FILTER TABS ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 0 20px;
      margin-bottom: 28px;
    }
    .filter-btn {
      padding: 5px 14px;
      background: transparent;
      border: 1px solid rgba(0,255,159,0.3);
      border-radius: 20px;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.75em;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(0,255,159,0.1);
      border-color: var(--border);
      color: var(--text);
      box-shadow: 0 0 8px rgba(0,255,159,0.3);
    }

    /* ── TOOLS GRID ── */
    #tools-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 0 20px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── TOOL CARD ── */
    .tool-card {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(0,255,159,0.3);
      padding: 20px 18px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      border-radius: 8px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .tool-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(0,255,159,0.06), transparent);
      opacity: 0;
      transition: opacity 0.5s;
    }
    .tool-card:hover::before { opacity: 1; }
    .tool-card:hover {
      transform: translateY(-4px);
      border-color: var(--border);
      box-shadow: 0 0 20px rgba(0,255,159,0.25), 0 8px 24px rgba(0,0,0,0.5);
    }

    .tool-icon { font-size: 1.8em; line-height: 1; }
    .tool-name {
      font-family: var(--font-title);
      font-size: 0.8em;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .tag {
      font-size: 0.72em;
      color: var(--text-muted);
      letter-spacing: 1px;
      border: 1px solid rgba(0,255,159,0.15);
      border-radius: 12px;
      padding: 2px 10px;
    }

    /* ── LOADING ── */
    #loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      letter-spacing: 3px;
      font-size: 0.9em;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,255,159,0.2);
      border-top-color: var(--border);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR / EMPTY ── */
    #status-msg {
      display: none;
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      letter-spacing: 2px;
      font-size: 0.85em;
    }

    /* ── TOOL VIEWER MODAL ── */
    #viewer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      flex-direction: column;
    }
    #viewer-overlay.open { display: flex; }

    .viewer-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #000;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--glow);
      flex-shrink: 0;
    }
    .viewer-close {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.85em;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .viewer-close:hover {
      background: rgba(0,255,159,0.1);
      box-shadow: var(--glow);
    }
    #viewer-title {
      font-family: var(--font-title);
      font-size: 0.8em;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    #viewer-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #000;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.75em;
      letter-spacing: 2px;
      border-top: 1px solid rgba(0,255,159,0.1);
    }

    @media (max-width: 480px) {
      #tools-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 0 12px 40px; }
      .title { letter-spacing: 3px; }
    }
  </style>
</head>
<body>

<div class="terminal">
  <span class="terminal-prompt">root@kali:~# </span><span id="typing"></span><span class="cursor"></span>
</div>

<h1 class="title">TOOLS DASHBOARD</h1>
<p class="subtitle">// PENETRATION TESTING CHEATSHEETS //</p>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Search tools..." autocomplete="off" spellcheck="false" />
</div>

<div class="filters">
  <button class="filter-btn active" data-cat="all">ALL</button>
  <button class="filter-btn" data-cat="recon">RECON</button>
  <button class="filter-btn" data-cat="exploit">EXPLOIT</button>
  <button class="filter-btn" data-cat="password">PASSWORD</button>
  <button class="filter-btn" data-cat="network">NETWORK</button>
  <button class="filter-btn" data-cat="linux">LINUX</button>
  <button class="filter-btn" data-cat="web">WEB</button>
  <button class="filter-btn" data-cat="wireless">WIRELESS</button>
  <button class="filter-btn" data-cat="osint">OSINT</button>
</div>

<div id="tools-container">
  <div id="loading"><span class="spinner"></span>LOADING TOOLS...</div>
  <div id="status-msg"></div>
</div>

<!-- Tool Viewer Modal (iframe) -->
<div id="viewer-overlay">
  <div class="viewer-topbar">
    <button class="viewer-close" id="viewer-close-btn">✕ CLOSE</button>
    <span id="viewer-title"></span>
  </div>
  <iframe id="viewer-frame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<footer>// HACK THE PLANET // USE RESPONSIBLY //</footer>

<script>
  // ── METADATA MAP ──
  // Maps filename → { display name, icon, tag, category }
  const META = {
    "nmap-cheatsheet.html":       { name: "Nmap",            icon: "🗺️",  tag: "Port Scanner",       cat: "recon"    },
    "metasploit.html":            { name: "Metasploit",       icon: "💀",  tag: "Exploit Framework",  cat: "exploit"  },
    "burpsuite.html":             { name: "Burp Suite",       icon: "🕷️",  tag: "Web Proxy",          cat: "web"      },
    "hydra.html":                 { name: "Hydra",            icon: "🔑",  tag: "Brute Force",        cat: "password" },
    "hashcat.html":               { name: "Hashcat",          icon: "🔓",  tag: "Hash Cracking",      cat: "password" },
    "john-the-ripper.html":       { name: "John the Ripper",  icon: "🗝️",  tag: "Password Cracker",   cat: "password" },
    "gobuster.html":              { name: "Gobuster",         icon: "📂",  tag: "Directory Fuzzer",   cat: "web"      },
    "gobuster-.html":             { name: "Gobuster (Alt)",   icon: "📂",  tag: "Directory Fuzzer",   cat: "web"      },
    "dirbuster.html":             { name: "DirBuster",        icon: "📁",  tag: "Dir Brute Force",    cat: "web"      },
    "dir-buster.html":            { name: "DirBuster (Alt)",  icon: "📁",  tag: "Dir Brute Force",    cat: "web"      },
    "amass.html":                 { name: "Amass",            icon: "🌐",  tag: "Subdomain Enum",     cat: "recon"    },
    "dnsenum.html":               { name: "DNSenum",          icon: "🔍",  tag: "DNS Enumeration",    cat: "recon"    },
    "nikto.html":                 { name: "Nikto",            icon: "🕵️",  tag: "Web Scanner",        cat: "web"      },
    "masscan.html":               { name: "Masscan",          icon: "⚡",  tag: "Mass Port Scan",     cat: "recon"    },
    "recon-ng-cheatsheet.html":   { name: "Recon-ng",         icon: "🧭",  tag: "OSINT Framework",    cat: "osint"    },
    "maltego.html":               { name: "Maltego",          icon: "🕸️",  tag: "Link Analysis",      cat: "osint"    },
    "Sherlock.html":              { name: "Sherlock",         icon: "🔎",  tag: "Username Lookup",    cat: "osint"    },
    "google-dorking.html":        { name: "Google Dorking",   icon: "🔭",  tag: "Search OSINT",       cat: "osint"    },
    "github-dorking.html":        { name: "GitHub Dorking",   icon: "🐙",  tag: "Code OSINT",         cat: "osint"    },
    "searchsploit.html":          { name: "SearchSploit",     icon: "💣",  tag: "Exploit Search",     cat: "exploit"  },
    "mimikatz.html":              { name: "Mimikatz",         icon: "🧠",  tag: "Credential Dump",    cat: "exploit"  },
    "BloodHound.html":            { name: "BloodHound",       icon: "🩸",  tag: "AD Attack Paths",    cat: "exploit"  },
    "empire.html":                { name: "Empire",           icon: "👑",  tag: "Post-Exploit C2",    cat: "exploit"  },
    "Medusa.html":                { name: "Medusa",           icon: "🐍",  tag: "Brute Force",        cat: "password" },
    "beef.html":                  { name: "BeEF",             icon: "🍖",  tag: "Browser Exploit",    cat: "web"      },
    "bettercap.html":             { name: "BetterCAP",        icon: "🎯",  tag: "Network Attack",     cat: "network"  },
    "kismet.html":                { name: "Kismet",           icon: "📡",  tag: "Wireless Sniffer",   cat: "wireless" },
    "nessus.html":                { name: "Nessus",           icon: "🔬",  tag: "Vuln Scanner",       cat: "recon"    },
    "OpenVAS.html":               { name: "OpenVAS",          icon: "🛡️",  tag: "Vuln Scanner",       cat: "recon"    },
    "king-phisher.html":          { name: "King Phisher",     icon: "🎣",  tag: "Phishing",           cat: "exploit"  },
    "SET.html":                   { name: "SET",              icon: "🎭",  tag: "Social Engineering", cat: "exploit"  },
    "hacktricks.website.sh.html": { name: "Hacktricks",       icon: "📖",  tag: "Reference",          cat: "exploit"  },
    "Linux-network.html":         { name: "Linux Network",    icon: "🌐",  tag: "Networking",         cat: "linux"    },
    "linux-file.html":            { name: "Linux File",       icon: "📄",  tag: "File Ops",           cat: "linux"    },
    "linux-user.html":            { name: "Linux User",       icon: "👤",  tag: "User Mgmt",          cat: "linux"    },
    "linux-user-.html":           { name: "Linux User (Alt)", icon: "👤",  tag: "User Mgmt",          cat: "linux"    },
    "linux-process.html":         { name: "Linux Process",    icon: "⚙️",  tag: "Process Mgmt",       cat: "linux"    },
    "linux-disk.html":            { name: "Linux Disk",       icon: "💽",  tag: "Disk Mgmt",          cat: "linux"    },
    "linux-log.html":             { name: "Linux Log",        icon: "📋",  tag: "Logging",            cat: "linux"    },
    "linix-package.html":         { name: "Linux Package",    icon: "📦",  tag: "Package Mgmt",       cat: "linux"    },
    "linix-permission.html":      { name: "Linux Permission", icon: "🔐",  tag: "Permissions",        cat: "linux"    },
    "linux-remote.html":          { name: "Linux Remote",     icon: "🖥️",  tag: "Remote Access",      cat: "linux"    },
    "linux-script.html":          { name: "Linux Script",     icon: "📜",  tag: "Scripting",          cat: "linux"    },
    "linux-cpmpression.html":     { name: "Linux Compress",   icon: "🗜️",  tag: "Compression",        cat: "linux"    },
    "linux-sys-info.html":        { name: "Linux Sys Info",   icon: "ℹ️",  tag: "System Info",        cat: "linux"    },
    "linux-sys-monitorm.html":    { name: "Linux Monitor",    icon: "📊",  tag: "Monitoring",         cat: "linux"    },
    "Java-utils.html":            { name: "Java Utils",       icon: "☕",  tag: "Java",               cat: "web"      },
    "Java.servlet.html":          { name: "Java Servlet",     icon: "☕",  tag: "Java Web",           cat: "web"      },
    "python.flask.html":          { name: "Python Flask",     icon: "🐍",  tag: "Python Web",         cat: "web"      },
  };

  function getMeta(filename) {
    if (META[filename]) return META[filename];
    // Fallback: derive name from filename
    const name = filename.replace('.html', '').replace(/[-_.]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    return { name, icon: '🛠️', tag: 'Tool', cat: 'recon' };
  }

  // ── STATE ──
  let allTools = [];      // array of filenames from API
  let currentCat = 'all';
  let currentSearch = '';

  const container    = document.getElementById('tools-container');
  const loadingEl    = document.getElementById('loading');
  const statusEl     = document.getElementById('status-msg');
  const searchInput  = document.getElementById('search');
  const filterBtns   = document.querySelectorAll('.filter-btn');
  const viewerOverlay = document.getElementById('viewer-overlay');
  const viewerFrame   = document.getElementById('viewer-frame');
  const viewerTitle   = document.getElementById('viewer-title');
  const viewerClose   = document.getElementById('viewer-close-btn');

  // ── FETCH TOOL LIST FROM API ──
  async function loadTools() {
    try {
      const res = await fetch('/api/tools');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const files = await res.json();
      allTools = files;
      loadingEl.style.display = 'none';
      renderCards();
    } catch (err) {
      loadingEl.style.display = 'none';
      statusEl.style.display = 'block';
      statusEl.textContent = `[ ERROR: ${err.message} ]`;
    }
  }

  // ── OPEN TOOL VIA API ──
  async function openTool(filename) {
    const meta = getMeta(filename);
    viewerTitle.textContent = meta.name.toUpperCase();

    // Point the iframe to the API route that serves the file
    viewerFrame.src = `/tools/${encodeURIComponent(filename)}`;
    viewerOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  // ── CLOSE VIEWER ──
  viewerClose.addEventListener('click', () => {
    viewerOverlay.classList.remove('open');
    viewerFrame.src = '';
    document.body.style.overflow = '';
  });

  // Close on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') viewerClose.click();
  });

  // ── RENDER CARDS ──
  function renderCards() {
    // Remove existing cards
    container.querySelectorAll('.tool-card').forEach(c => c.remove());

    const filtered = allTools.filter(filename => {
      const meta = getMeta(filename);
      const matchCat = currentCat === 'all' || meta.cat === currentCat;
      const q = currentSearch.toLowerCase();
      const matchSearch = !q || meta.name.toLowerCase().includes(q) || meta.tag.toLowerCase().includes(q) || filename.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });

    if (filtered.length === 0) {
      statusEl.style.display = 'block';
      statusEl.textContent = '[ NO TOOLS FOUND ]';
    } else {
      statusEl.style.display = 'none';
    }

    filtered.forEach((filename, i) => {
      const meta = getMeta(filename);
      const card = document.createElement('div');
      card.className = 'tool-card';
      card.innerHTML = `
        <span class="tool-icon">${meta.icon}</span>
        <span class="tool-name">${meta.name}</span>
        <span class="tag">${meta.tag}</span>
      `;
      card.addEventListener('click', () => openTool(filename));
      container.insertBefore(card, statusEl);
    });
  }

  // ── SEARCH ──
  searchInput.addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    renderCards();
  });

  // ── FILTER ──
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderCards();
    });
  });

  // ── TYPING ANIMATION ──
  const phrases = ['ls -la /tools/', 'cat cheatsheets.txt', 'grep -r "payload" ./', 'nmap -sV target'];
  let phraseIdx = 0, charIdx = 0, deleting = false;
  const typingEl = document.getElementById('typing');
  function type() {
    const phrase = phrases[phraseIdx];
    if (!deleting) {
      typingEl.textContent = phrase.slice(0, ++charIdx);
      if (charIdx === phrase.length) { deleting = true; setTimeout(type, 1800); return; }
    } else {
      typingEl.textContent = phrase.slice(0, --charIdx);
      if (charIdx === 0) { deleting = false; phraseIdx = (phraseIdx + 1) % phrases.length; }
    }
    setTimeout(type, deleting ? 40 : 80);
  }
  type();

  // ── BOOT ──
  loadTools();
</script>
</body>
</html>
